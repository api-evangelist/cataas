naftiko: 1.0.0-alpha2
info:
  label: Cataas API — Catalog
  description: 'Catalog surface of the Cataas (Cat as a Service) API. 3 operations. Lead operation: CATAAS List Cats in the Catalog. Self-contained Naftiko capability covering one Cataas business surface.'
  tags:
  - Cataas
  - Cats
  - Catalog
  created: '2026-05-30'
  modified: '2026-05-30'
capability:
  consumes:
  - type: http
    namespace: cataas-catalog
    baseUri: https://cataas.com
    description: Cataas API — Catalog business capability. Self-contained, no shared references.
    resources:
    - name: api-cats
      path: /api/cats
      operations:
      - name: listCats
        method: GET
        description: CATAAS List Cats in the Catalog
        inputParameters:
        - name: tags
          in: query
          type: string
          required: false
          description: Comma-separated list of tags to filter on. Returns only cats that carry at least one of the given tags.
        - name: skip
          in: query
          type: integer
          required: false
          description: Number of records to skip for pagination.
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of records to return.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-tags
      path: /api/tags
      operations:
      - name: listTags
        method: GET
        description: CATAAS List All Available Tags
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-count
      path: /api/count
      operations:
      - name: getCatCount
        method: GET
        description: CATAAS Get the Total Number of Cats
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: cataas-catalog-rest
    port: 8080
    description: REST adapter for Cataas API — Catalog. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/cats
      name: v1-cats
      description: REST surface for /v1/cats.
      operations:
      - method: GET
        name: listCats
        description: CATAAS List Cats in the Catalog
        call: cataas-catalog.listCats
        with:
          tags: rest.tags
          skip: rest.skip
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tags
      name: v1-tags
      description: REST surface for /v1/tags.
      operations:
      - method: GET
        name: listTags
        description: CATAAS List All Available Tags
        call: cataas-catalog.listTags
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/count
      name: v1-count
      description: REST surface for /v1/count.
      operations:
      - method: GET
        name: getCatCount
        description: CATAAS Get the Total Number of Cats
        call: cataas-catalog.getCatCount
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cataas-catalog-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cataas API — Catalog. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: listcats
      description: CATAAS List Cats in the Catalog
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cataas-catalog.listCats
      with:
        tags: tools.tags
        skip: tools.skip
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: listtags
      description: CATAAS List All Available Tags
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cataas-catalog.listTags
      outputParameters:
      - type: object
        mapping: $.
    - name: getcatcount
      description: CATAAS Get the Total Number of Cats
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cataas-catalog.getCatCount
      outputParameters:
      - type: object
        mapping: $.
