naftiko: 1.0.0-alpha2
info:
  label: Cataas API — Admin
  description: 'Admin surface of the Cataas (Cat as a Service) API. 4 operations. Lead operation: CATAAS Administrative List of Cats. Self-contained Naftiko capability covering one Cataas business surface.'
  tags:
  - Cataas
  - Cats
  - Admin
  created: '2026-05-30'
  modified: '2026-05-30'
binds:
- namespace: env
  keys:
    CATAAS_ADMIN_TOKEN: CATAAS_ADMIN_TOKEN
capability:
  consumes:
  - type: http
    namespace: cataas-admin
    baseUri: https://cataas.com
    description: Cataas API — Admin business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.CATAAS_ADMIN_TOKEN}}'
    resources:
    - name: admin-cats
      path: /admin/cats
      operations:
      - name: adminListCats
        method: GET
        description: CATAAS Administrative List of Cats
        inputParameters:
        - name: skip
          in: query
          type: integer
          required: false
          description: Number of records to skip for pagination.
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of records to return.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: admin-cats-id
      path: /admin/cats/{id}
      operations:
      - name: adminValidateCat
        method: PUT
        description: CATAAS Validate a Cat Record
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Catalog id of the cat document.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: adminEditCat
        method: PATCH
        description: CATAAS Edit a Cat Record
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Catalog id of the cat document.
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: adminDeleteCat
        method: DELETE
        description: CATAAS Delete a Cat Record
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Catalog id of the cat document.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: cataas-admin-rest
    port: 8080
    description: REST adapter for Cataas API — Admin. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/cats
      name: v1-cats
      description: REST surface for /v1/cats.
      operations:
      - method: GET
        name: adminListCats
        description: CATAAS Administrative List of Cats
        call: cataas-admin.adminListCats
        with:
          skip: rest.skip
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cats/{id}
      name: v1-cats-id
      description: REST surface for /v1/cats/{id}.
      operations:
      - method: PUT
        name: adminValidateCat
        description: CATAAS Validate a Cat Record
        call: cataas-admin.adminValidateCat
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: adminEditCat
        description: CATAAS Edit a Cat Record
        call: cataas-admin.adminEditCat
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: adminDeleteCat
        description: CATAAS Delete a Cat Record
        call: cataas-admin.adminDeleteCat
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cataas-admin-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cataas API — Admin. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: adminlistcats
      description: CATAAS Administrative List of Cats
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cataas-admin.adminListCats
      with:
        skip: tools.skip
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: adminvalidatecat
      description: CATAAS Validate a Cat Record
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: cataas-admin.adminValidateCat
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: admineditcat
      description: CATAAS Edit a Cat Record
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: cataas-admin.adminEditCat
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: admindeletecat
      description: CATAAS Delete a Cat Record
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: cataas-admin.adminDeleteCat
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
