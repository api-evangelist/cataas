naftiko: 1.0.0-alpha2
info:
  label: Cataas API — Upload
  description: 'Upload surface of the Cataas (Cat as a Service) API. 1 operations. Lead operation: CATAAS Upload a New Cat Image. Self-contained Naftiko capability covering one Cataas business surface.'
  tags:
  - Cataas
  - Cats
  - Upload
  created: '2026-05-30'
  modified: '2026-05-30'
capability:
  consumes:
  - type: http
    namespace: cataas-upload
    baseUri: https://cataas.com
    description: Cataas API — Upload business capability. Self-contained, no shared references.
    resources:
    - name: upload
      path: /upload
      operations:
      - name: uploadCat
        method: POST
        description: CATAAS Upload a New Cat Image
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: cataas-upload-rest
    port: 8080
    description: REST adapter for Cataas API — Upload. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/upload
      name: v1-upload
      description: REST surface for /v1/upload.
      operations:
      - method: POST
        name: uploadCat
        description: CATAAS Upload a New Cat Image
        call: cataas-upload.uploadCat
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cataas-upload-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cataas API — Upload. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: uploadcat
      description: CATAAS Upload a New Cat Image
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cataas-upload.uploadCat
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
