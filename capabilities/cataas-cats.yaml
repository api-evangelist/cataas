          in: path
          type: string
          required: true
          description: Text to overlay onto the image.
        - name: fontSize
          in: query
          type: integer
          required: false
          description: Font size in pixels for `/says/` text overlays.
        - name: fontColor
          in: query
          type: string
          required: false
          description: Font color name or hex value (e.g., `red`, `#ffffff`).
        - name: fontBackground
          in: query
          type: string
          required: false
          description: Background color behind the overlay text.
        - name: json
          in: query
          type: boolean
          required: false
          description: When `true`, return a JSON metadata document instead of the binary image.
        - name: html
          in: query
          type: boolean
          required: false
          description: When `true`, return an HTML page that embeds the image.
        - name: type
          in: query
          type: string
          required: false
          description: Sized variant of the image.
        - name: filter
          in: query
          type: string
          required: false
          description: Visual filter applied to the image.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cat-tag-says-text
      path: /cat/{tag}/says/{text}
      operations:
      - name: getRandomCatByTagSays
        method: GET
        description: CATAAS Get a Random Tagged Cat with Text Overlay
        inputParameters:
        - name: tag
          in: path
          type: string
          required: true
          description: One or more comma-separated tags.
        - name: text
          in: path
          type: string
          required: true
          description: Text to overlay onto the image.
        - name: fontSize
          in: query
          type: integer
          required: false
          description: Font size in pixels for `/says/` text overlays.
        - name: fontColor
          in: query
          type: string
          required: false
          description: Font color name or hex value (e.g., `red`, `#ffffff`).
        - name: fontBackground
          in: query
          type: string
          required: false
          description: Background color behind the overlay text.
        - name: json
          in: query
          type: boolean
          required: false
          description: When `true`, return a JSON metadata document instead of the binary image.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cat-id
      path: /cat/{id}
      operations:
      - name: getCatById
        method: GET
        description: CATAAS Get a Specific Cat Image by Id
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Catalog id of the cat document.
        - name: json
          in: query
          type: boolean
          required: false
          description: When `true`, return a JSON metadata document instead of the binary image.
        - name: html
          in: query
          type: boolean
          required: false
          description: When `true`, return an HTML page that embeds the image.
        - name: type
          in: query
          type: string
          required: false
          description: Sized variant of the image.
        - name: filter
          in: query
          type: string
          required: false
          description: Visual filter applied to the image.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cat-id-says-text
      path: /cat/{id}/says/{text}
      operations:
      - name: getCatByIdSays
        method: GET
        description: CATAAS Get a Specific Cat with Text Overlay
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Catalog id of the cat document.
        - name: text
          in: path
          type: string
          required: true
          description: Text to overlay onto the image.
        - name: fontSize
