naftiko: 1.0.0-alpha2
info:
  label: Cataas API — Cats
  description: 'Cats surface of the Cataas (Cat as a Service) API. 7 operations. Lead operation: CATAAS Get a Random Cat Image. Self-contained Naftiko capability covering one Cataas business surface.'
  tags:
  - Cataas
  - Cats
  created: '2026-05-30'
  modified: '2026-05-30'
capability:
  consumes:
  - type: http
    namespace: cataas-cats
    baseUri: https://cataas.com
    description: Cataas API — Cats business capability. Self-contained, no shared references.
    resources:
    - name: cat
      path: /cat
      operations:
      - name: getRandomCat
        method: GET
        description: CATAAS Get a Random Cat Image
        inputParameters:
        - name: json
          in: query
          type: boolean
          required: false
          description: When `true`, return a JSON metadata document instead of the binary image.
        - name: html
          in: query
          type: boolean
          required: false
          description: When `true`, return an HTML page that embeds the image.
        - name: type
          in: query
          type: string
          required: false
          description: Sized variant of the image.
        - name: width
          in: query
          type: integer
          required: false
          description: Resize the image to the specified width in pixels (max 1000).
        - name: height
          in: query
          type: integer
          required: false
          description: Resize the image to the specified height in pixels (max 1000).
        - name: fit
          in: query
          type: string
          required: false
          description: Resize strategy when both width and height are provided.
        - name: position
          in: query
          type: string
          required: false
          description: Position of the cropped image when `fit=cover` or `fit=contain`.
        - name: filter
          in: query
          type: string
          required: false
          description: Visual filter applied to the image.
        - name: blur
          in: query
          type: number
          required: false
          description: Blur radius when `filter=blur`.
        - name: brightness
          in: query
          type: number
          required: false
          description: Brightness multiplier for `filter=custom`.
        - name: lightness
          in: query
          type: number
          required: false
          description: Lightness offset for `filter=custom`.
        - name: saturation
          in: query
          type: number
          required: false
          description: Saturation multiplier for `filter=custom`.
        - name: hue
          in: query
          type: integer
          required: false
          description: Hue rotation in degrees for `filter=custom`.
        - name: r
          in: query
          type: integer
          required: false
          description: Red channel multiplier (0-255) for `filter=custom`.
        - name: g
          in: query
          type: integer
          required: false
          description: Green channel multiplier (0-255) for `filter=custom`.
        - name: b
          in: query
          type: integer
          required: false
          description: Blue channel multiplier (0-255) for `filter=custom`.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cat-tag
      path: /cat/{tag}
      operations:
      - name: getRandomCatByTag
        method: GET
        description: CATAAS Get a Random Cat Image by Tag
        inputParameters:
        - name: tag
          in: path
          type: string
          required: true
          description: 'One tag or several comma-separated tags. Example: `cute` or `cute,orange`.'
        - name: json
          in: query
          type: boolean
          required: false
          description: When `true`, return a JSON metadata document instead of the binary image.
        - name: html
          in: query
          type: boolean
          required: false
          description: When `true`, return an HTML page that embeds the image.
        - name: type
          in: query
          type: string
          required: false
          description: Sized variant of the image.
        - name: width
          in: query
          type: integer
          required: false
          description: Resize the image to the specified width in pixels (max 1000).
        - name: height
          in: query
          type: integer
          required: false
          description: Resize the image to the specified height in pixels (max 1000).
        - name: fit
          in: query
          type: string
          required: false
          description: Resize strategy when both width and height are provided.
        - name: position
          in: query
          type: string
          required: false
          description: Position of the cropped image when `fit=cover` or `fit=contain`.
        - name: filter
          in: query
          type: string
          required: false
          description: Visual filter applied to the image.
        - name: blur
          in: query
          type: number
          required: false
          description: Blur radius when `filter=blur`.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cat-gif
      path: /cat/gif
      operations:
      - name: getRandomCatGif
        method: GET
        description: CATAAS Get a Random Cat GIF
        inputParameters:
        - name: json
          in: query
          type: boolean
          required: false
          description: When `true`, return a JSON metadata document instead of the binary image.
        - name: html
          in: query
          type: boolean
          required: false
          description: When `true`, return an HTML page that embeds the image.
        - name: width
          in: query
          type: integer
          required: false
          description: Resize the image to the specified width in pixels (max 1000).
        - name: height
          in: query
          type: integer
          required: false
          description: Resize the image to the specified height in pixels (max 1000).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cat-says-text
      path: /cat/says/{text}
      operations:
      - name: getRandomCatSays
        method: GET
        description: CATAAS Get a Random Cat Image with Text Overlay
        inputParameters:
