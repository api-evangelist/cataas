          required: false
          description: Font size in pixels for `/says/` text overlays.
        - name: fontColor
          in: query
          type: string
          required: false
          description: Font color name or hex value (e.g., `red`, `#ffffff`).
        - name: fontBackground
          in: query
          type: string
          required: false
          description: Background color behind the overlay text.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
